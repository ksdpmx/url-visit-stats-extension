<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>URL Visit Stats Options</title>
    <link rel="stylesheet" href="options.css">
  </head>
  <body>
    <main>
      <h1>URL Visit Stats Options</h1>
      <form id="settings-form">
        <label class="checkbox-option">
          <input id="strip-hash" type="checkbox">
          Ignore URL hash fragments
        </label>
        <label class="checkbox-option">
          <input id="strip-trailing-slash" type="checkbox">
          Treat trailing slash as the same URL
        </label>
        <label class="checkbox-option">
          <input id="strip-tracking-params" type="checkbox">
          Ignore tracking query parameters
        </label>
        <label>
          Tracking parameters
          <textarea id="tracking-params" rows="5"></textarea>
        </label>
        <div class="actions">
          <button type="submit">Save</button>
        </div>
      </form>
      <section class="options-section" aria-labelledby="visit-data-title">
        <h2 id="visit-data-title">Visit data</h2>
        <div class="actions">
          <button id="clear-stats" class="danger" type="button">Clear visit counts</button>
        </div>
      </section>
      <section class="options-section" aria-labelledby="backup-title">
        <h2 id="backup-title">Backup and restore</h2>
        <div class="actions">
          <button id="export-backup" type="button">Export backup</button>
          <button id="import-merge" type="button">Import and merge</button>
          <button id="import-overwrite" class="danger" type="button">Import and overwrite</button>
          <input id="import-file" type="file" accept="application/json,.json" hidden>
        </div>
        <p class="hint">Merge adds counts and read markers while keeping current settings. Overwrite replaces stats, read markers, and settings.</p>
      </section>
      <p id="status" role="status"></p>
    </main>
    <script src="options.js"></script>
  </body>
</html>
